################################################################################
# Sentinel FPGA Build Pipeline - Logrotate Configuration
#
# Purpose:
#   Prevents log files from consuming all disk space by automatically
#   rotating, compressing, and deleting old log files.
#
# Installation:
#   sudo cp sentinel-logrotate.conf /etc/logrotate.d/sentinel
#
# Testing:
#   sudo logrotate -d /etc/logrotate.d/sentinel  # Dry run (test)
#   sudo logrotate -f /etc/logrotate.d/sentinel  # Force rotation now
#
# How It Works:
#   - Runs daily via cron (usually /etc/cron.daily/logrotate)
#   - Rotates logs when conditions are met
#   - Compresses old logs with gzip (.gz)
#   - Deletes logs older than retention period
#
# Author: Sentinel Development Team
# Date: November 2025
################################################################################

# Main application logs (/var/log/sentinel/*.log)
/var/log/sentinel/*.log {
    daily                    # Check daily for rotation
    rotate 14                # Keep 14 days of logs (2 weeks)
    compress                 # Compress rotated logs with gzip
    delaycompress           # Don't compress the most recent rotation (active writing)
    missingok               # Don't error if log file doesn't exist
    notifempty              # Don't rotate if log is empty (saves disk space)
    create 0640 sentinel sentinel  # Create new log files with these permissions/owner
    sharedscripts           # Run postrotate script once for all logs (not per file)
    postrotate
        # Reload Sentinel service to reopen log files after rotation
        # Prevents writing to old rotated files
        systemctl reload sentinel.service >/dev/null 2>&1 || true
    endscript
}

# Per-run logs (/var/log/sentinel/runs/*/*.log)
/var/log/sentinel/runs/*/*.log {
    weekly                   # Rotate weekly (less frequent, historical data)
    rotate 8                 # Keep 8 weeks of run logs (~2 months)
    compress                 # Compress old run logs
    delaycompress           # Keep most recent uncompressed
    missingok               # Old runs may not exist
    notifempty              # Don't rotate empty run logs
    create 0640 sentinel sentinel  # Maintain proper ownership
}

################################################################################
# Disk Space Management
#
# With default settings:
#   - Main logs: 14 days @ ~10MB/day compressed = ~140MB max
#   - Run logs:  8 weeks @ ~50MB/week compressed = ~400MB max
#   - Total maximum: ~540MB for all logs
#
# Adjust 'rotate' values if disk space is limited:
#   rotate 7   = 1 week
#   rotate 14  = 2 weeks (default)
#   rotate 30  = 1 month
#   rotate 90  = 3 months
################################################################################
